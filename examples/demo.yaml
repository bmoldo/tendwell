# Tendwell demo configuration - zero real infrastructure.
#
# Uses the synthetic data source in its "degraded" scenario, so the agent has a
# real SLO breach to find and explain. Knowledge comes from the bundled generic
# runbooks. LLM and embeddings point at a local OpenAI-compatible runtime
# (Ollama defaults shown), so this config is local-first: it emits zero egress
# warnings. Point base_url elsewhere and Tendwell will warn.
#
# Run it:  tendwell run --config examples/demo.yaml

llm:
  base_url: http://localhost:11434/v1
  model: qwen2.5:14b
  capabilities:
    native_tool_calling: true

embeddings:
  base_url: http://localhost:11434/v1
  model: nomic-embed-text

data_sources:
  - name: demo
    type: synthetic
    scenario: degraded
    seed: 7
    queries:
      - id: error_rate
      - id: latency_p99

slos:
  - name: availability
    metric: error_rate
    threshold: 0.01
    direction: below
  - name: latency
    metric: latency_p99
    threshold: 0.5
    direction: below

context:
  vector_store:
    type: chroma
    path: ./data/vectors
  loaders:
    - type: markdown
      path: tendwell/demo/knowledge
      refresh: 3600

permissions:
  mode: read_only

server:
  mode: on_demand
  host: 127.0.0.1
  port: 8080

agent:
  persona: >
    You are a production health analyst. You observe metrics and knowledge
    context, and you report findings clearly. You do not take actions.
  max_reasoning_steps: 6
