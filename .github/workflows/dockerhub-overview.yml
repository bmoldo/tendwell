name: dockerhub-overview

# Sync the Docker Hub repository short description, overview (full description),
# and categories for bmoldovan/tendwell. Runs on a manual trigger or when the
# overview file changes. Uses the DOCKERHUB_USERNAME and DOCKERHUB_TOKEN secrets.

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - deploy/docker/overview.md
      - .github/workflows/dockerhub-overview.yml

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
      REPO: bmoldovan/tendwell
    steps:
      - uses: actions/checkout@v4

      - name: Sync description, overview, and categories
        run: |
          set -euo pipefail
          token=$(curl -fsS -X POST https://hub.docker.com/v2/users/login \
            -H 'Content-Type: application/json' \
            -d "$(jq -n --arg u "$DOCKERHUB_USERNAME" --arg p "$DOCKERHUB_TOKEN" '{username:$u,password:$p}')" \
            | jq -r .token)
          echo "auth token length: ${#token}"

          short="Self-hosted, local-first AgentOps: monitors production health; human-gated, audited actions."

          # Description + overview (the primary goal; this step decides pass/fail).
          desc_payload=$(jq -n --arg d "$short" --rawfile f deploy/docker/overview.md \
            '{description:$d, full_description:$f}')
          desc_code=$(curl -sS -X PATCH "https://hub.docker.com/v2/repositories/$REPO/" \
            -H "Authorization: JWT $token" -H 'Content-Type: application/json' \
            -d "$desc_payload" -o /tmp/desc.json -w '%{http_code}')
          echo "description+overview: HTTP $desc_code"
          head -c 300 /tmp/desc.json; echo

          # Categories (best-effort; does not fail the job).
          cat_payload=$(jq -n \
            '{categories:[
              {name:"Monitoring & observability", slug:"monitoring-and-observability"},
              {name:"Machine learning & AI", slug:"machine-learning-and-ai"}
            ]}')
          cat_code=$(curl -sS -X PATCH "https://hub.docker.com/v2/repositories/$REPO/" \
            -H "Authorization: JWT $token" -H 'Content-Type: application/json' \
            -d "$cat_payload" -o /tmp/cat.json -w '%{http_code}')
          echo "categories: HTTP $cat_code"
          head -c 300 /tmp/cat.json; echo

          test "$desc_code" = "200"
