name: release

# On a version tag (for example v0.0.1) or a manual run:
#   - publish the package to PyPI (TENDWELL_PYPI token secret)
#   - build and push the container image to Docker Hub
#     (DOCKERHUB_USERNAME and DOCKERHUB_TOKEN secrets)
# The two jobs are independent; either can be re-run without affecting the other.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  pypi:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Build sdist and wheel
        run: uv build

      - name: Check metadata
        run: uvx twine check dist/*

      - name: Publish to PyPI
        # --check-url points at the simple index ROOT; uv appends the package
        # name and skips files already present, so re-running a tag does not fail
        # on an already-published version.
        run: uv publish --check-url https://pypi.org/simple/ --token "${{ secrets.TENDWELL_PYPI }}"

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker metadata (tags and labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: bmoldovan/tendwell
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
