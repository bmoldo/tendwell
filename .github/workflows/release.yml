name: release

# Publishes the package to PyPI when a version tag is pushed (for example
# v0.0.1), or on a manual run. Build artifacts are produced with uv and uploaded
# with the TENDWELL_PYPI token secret.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Build sdist and wheel
        run: uv build

      - name: Check metadata
        run: uvx twine check dist/*

      - name: Publish to PyPI
        run: uv publish --token "${{ secrets.TENDWELL_PYPI }}"
